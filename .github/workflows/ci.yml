name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  typescript:
    name: TypeScript package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: Swatinem/rust-cache@v2
      - working-directory: packages/semfast-node
        run: bun install --frozen-lockfile
      - working-directory: packages/semfast-node
        run: bun run build
      - working-directory: packages/semfast-node
        run: bun run test
